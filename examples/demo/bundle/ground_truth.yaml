schema_version: "incidentforge.ground_truth.v1"
incident_id: "ifg-dc5e156218"
scenario: "kafka-consumer-lag"
service: "payments-consumer"
severity: "SEV2"
root_cause: "A backward-incompatible schema change introduced a poison message that repeatedly fails deserialization and stalls the payments consumer group."
root_cause_terms:
  - "poison message"
  - "schema change"
  - "deserialization"
  - "payments consumer group"
  - "consumer lag"
evidence_terms:
  - "consumer_lag_spike"
  - "deserialize_errors"
  - "stable_broker_cpu"
  - "Lag rises from 180 to more than 52000 offsets after 10:08 UTC."
  - "Decode errors repeat for checkout.payment_authorized.v7."
  - "Broker CPU remains below 42 percent, reducing broker saturation likelihood."
remediation_terms:
  - "skip poison message"
  - "rollback schema"
  - "add dead letter queue"
  - "restart consumer"
  - "schema compatibility"
red_herring_terms:
  - "checkout-api deploy"
  - "frontend validation"
  - "leader election"
  - "broker outage"
impact: "Payment confirmation events are delayed by 18 to 24 minutes."
expected_signals:
  -
    name: "consumer_lag_spike"
    source: "metrics"
    query: "sum(kafka_consumer_lag{group=\"payments-consumer\"})"
    expected: "Lag rises from 180 to more than 52000 offsets after 10:08 UTC."
    weight: 1.0
  -
    name: "deserialize_errors"
    source: "logs"
    query: "service=\"payments-consumer\" \"SchemaRegistryDecodeError\""
    expected: "Decode errors repeat for checkout.payment_authorized.v7."
    weight: 1.0
  -
    name: "stable_broker_cpu"
    source: "metrics"
    query: "avg(kafka_broker_cpu{cluster=\"orders-eu\"})"
    expected: "Broker CPU remains below 42 percent, reducing broker saturation likelihood."
    weight: 1.0
red_herrings:
  -
    clue: "A checkout-api deploy completed four minutes before the page fired."
    reason: "The deploy only changed frontend validation and request volume stayed flat."
    penalty_terms: ["checkout-api deploy", "frontend validation"]
    weight: 1.0
  -
    clue: "A Kafka broker leader election occurred earlier in the hour."
    reason: "Partition ISR recovered before the lag spike and broker health is normal."
    penalty_terms: ["leader election", "broker outage"]
    weight: 1.0
